<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Oyster Herbals</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 40%, #388e3c 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #fff;
      width: 100%;
      max-width: 420px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #2e7d32, #4caf50);
      padding: 2rem 2rem 1.5rem;
      text-align: center;
      color: #fff;
    }

    .card-header .icon {
      width: 64px; height: 64px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
      font-size: 1.6rem;
    }

    .card-header h1 { font-size: 1.5rem; font-weight: 700; }
    .card-header p  { font-size: 0.85rem; opacity: 0.85; margin-top: 0.25rem; }

    .card-body { padding: 2rem; }

    .alert {
      padding: 0.75rem 1rem;
      border-radius: 10px;
      margin-bottom: 1rem;
      font-size: 0.875rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .alert-danger  { background: #fdecea; color: #c62828; border-left: 4px solid #e53935; }
    .alert-success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #43a047; }

    .form-group { margin-bottom: 1.1rem; }

    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #2e7d32;
      margin-bottom: 0.4rem;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap i {
      position: absolute;
      left: 0.9rem; top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      font-size: 0.95rem;
    }

    .form-control {
      width: 100%;
      padding: 0.72rem 0.9rem 0.72rem 2.4rem;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 0.9rem;
      font-family: 'Poppins', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .form-control:focus {
      border-color: #4caf50;
      box-shadow: 0 0 0 3px rgba(76,175,80,0.15);
    }

    .btn {
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, #2e7d32, #4caf50);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 0.5rem;
    }

    .btn:hover { opacity: 0.93; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .footer-link {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.85rem;
      color: #666;
    }

    .footer-link a {
      color: #2e7d32;
      font-weight: 600;
      text-decoration: none;
    }

    .footer-link a:hover { text-decoration: underline; }

    .back-home {
      display: block;
      text-align: center;
      margin-top: 0.75rem;
      font-size: 0.82rem;
      color: #999;
      text-decoration: none;
    }

    .back-home:hover { color: #2e7d32; }
  </style>
</head>

<body>
  <div class="card">
    <div class="card-header">
      <div class="icon"><i class="fa-solid fa-user-plus"></i></div>
      <h1>Create Account</h1>
      <p>Join to share your reviews</p>
    </div>
    <div class="card-body">

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">
              <i class="fa-solid fa-{{ 'circle-check' if category == 'success' else 'circle-exclamation' }}"></i>
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('user_register') }}">
        <div class="form-group">
          <label for="name">Full Name</label>
          <div class="input-wrap">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="name" name="name" class="form-control" placeholder="Your full name" required>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="email" name="email" class="form-control" placeholder="you@email.com" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" name="password" class="form-control" placeholder="Min. 6 characters" required minlength="6">
          </div>
        </div>

        <button type="submit" class="btn">
          <i class="fa-solid fa-user-plus"></i>&nbsp; Register
        </button>
      </form>

      <p class="footer-link">
        Already have an account? <a href="{{ url_for('user_login') }}">Log In</a>
      </p>
      <a href="{{ url_for('home') }}" class="back-home">
        <i class="fa-solid fa-arrow-left"></i> Back to Home
      </a>
    </div>
  </div>
</body>

</html>
